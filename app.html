<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChoreoGraph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="splash">
  <div class="splash-atmosphere"></div>

  <div class="splash-content">

    <h1 class="brand">
      Choreo<span class="accent">Graph</span>
    </h1>

    <p class="tagline">
      Where movement becomes sound
    </p>

    <div class="divider"></div>

    <p class="description">
      Draw gestures. Compose motion. Score the scene.
    </p>

    <button id="start-btn">Enter Flow State</button>

  </div>
</div>

<div id="app">
  <div id="stage">
    <video id="bg-video" loop muted playsinline>
      <source src="Default.mp4" type="video/mp4" />
    </video>
    <canvas id="drawing-canvas"></canvas>
    <div id="playhead"></div>
    <div id="eraser-cursor"></div>
    <div id="hint">Draw anywhere to compose</div>
  </div>

  <div id="controls">
    <div class="csec grow">
      <input type="range" id="timeline-scrubber" min="0" max="100" value="0" step="0.01" />
      <span class="tlabel" id="time-display">00:00 / 00:00</span>
    </div>

    <div class="div"></div>

    <div class="brushes">
      <button class="brush-btn active" data-brush="orchestral"><div class="swatch"></div>Synth</button>
      <button class="brush-btn" data-brush="electronic"><div class="swatch"></div>Electric</button>
      <button class="brush-btn" data-brush="ethereal"><div class="swatch"></div>Ethereal</button>
      <button class="brush-btn" data-brush="eraser" id="eraser-btn"><div class="swatch eraser-swatch"></div>Eraser</button>
    </div>

    <div class="div"></div>

    <div class="csec">
      <input type="range" id="pitch-slider" min="-24" max="24" value="0" step="1" />
      <span class="tlabel" id="pitch-display">Pitch  0</span>
    </div>

    <div class="div"></div>

    <div class="transport">
      <button id="upload-btn" class="tbtn">Upload Video</button>
      <input id="video-upload" type="file" accept="video/*" style="display:none;" />
      <button id="preview-btn" class="tbtn">Open Player</button>
      <button id="beat-btn" style="background: var(--bass); color: white; border: none; padding: 10px 16px; border-radius: 2px; cursor: pointer; font-family: 'DM Mono'; font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase;">Drop Beat</button>
      <button class="tbtn" id="clear-btn">Clear</button>
      <button id="scene-btn">Play Scene</button>
    </div>
  </div>
</div>

<div id="player-modal" class="player-modal" style="display:none;">
  <div class="player-backdrop"></div>
  <div class="player-content">
    <button id="close-player" class="close-player">✕</button>
    <video id="preview-video" controls style="width:100%; height:100%; object-fit:contain;"></video>
  </div>
</div>

<script src="main.js"></script>
<div style="position: fixed; left: 50%; bottom: 8px; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.7); text-align:center; z-index: 1000; pointer-events:none;">Developed with assistance from Google Gemini for code iteration + Flow for rapid video creation.</div>
</body>
</html>
